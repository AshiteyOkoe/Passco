services:
  - type: web
    name: passco-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npx tsx src/index.ts
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
